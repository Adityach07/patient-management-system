spring.datasource.url=jdbc:h2:mem:patientdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never

grpc.client.billing-service.address=static://localhost:9001
grpc.client.billing-service.negotiation-type=plaintext

spring.kafka.bootstrap-servers=localhost:9092
app.kafka.topic.patient-created=patient.created
