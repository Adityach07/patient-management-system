spring.application.name=auth-service

# 1. Server Configuration
server.port=${SERVER_PORT:4005}

# 2. PostgreSQL Database Connection
# Defaults to localhost:5433 (your Docker mapped port) for local runs, or uses env variables inside Docker Compose
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/authdb?options=-c%20timezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. JWT Custom Properties (Read by JwtUtil.java)
# Make sure the secret key is at least 256-bits (32 characters) long
app.jwt.secret=mySuperSecretSecureSignatureKeyForAuthService1234567890!
app.jwt.expiration=86400000 