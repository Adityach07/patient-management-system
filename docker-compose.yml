services:

  postgres-db:
    image: postgres:17
    container_name: postgres-db
    environment:
      POSTGRES_DB: patientdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d patientdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - patient-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - patient-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - patient-network

  billing-service:
    build:
      context: ./billing-service
    container_name: billing-service
    ports:
      - "4001:4001"
      - "9001:9001"
    environment:
      SERVER_PORT: 4001
      GRPC_SERVER_PORT: 9001
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - patient-network

  patient-service:
    build:
      context: ./Patient-service
    container_name: patient-service
    ports:
      - "4000:4000"
    environment:
      SERVER_PORT: 4000
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/patientdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
      GRPC_CLIENT_BILLING_SERVICE_ADDRESS: static://billing-service:9001
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-db:
        condition: service_healthy
      billing-service:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - patient-network

  analytics-service:
    build:
      context: ./analytics-service
    container_name: analytics-service
    ports:
      - "5000:5000"
    environment:
      SERVER_PORT: 5000
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_started
    networks:
      - patient-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - patient-network

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "4004:4004"
    environment:
      SERVER_PORT: 4004
      PATIENT_SERVICE_URI: http://patient-service:4000
      BILLING_SERVICE_URI: http://billing-service:4001
      ANALYTICS_SERVICE_URI: http://analytics-service:5000
      AUTH_SERVICE_URI: http://auth-service:4005  # Added this environment variable
    depends_on:
      - patient-service
      - billing-service
      - analytics-service
      - auth-service
    networks:
      - patient-network

  auth-db:
    image: postgres:17
    container_name: auth-db
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authdb"]  # Corrected to -U postgres
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - patient-network

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    ports:
      - "4005:4005"
    environment:
      SERVER_PORT: 4005
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/authdb?options=-c%20timezone=UTC
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - patient-network

networks:
  patient-network:
    driver: bridge